name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags="-w -s" -o veil cmd/main.go
          tar -czf "veil_${GITHUB_REF_NAME#v}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz" veil

      - uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
